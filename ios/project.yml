name: BPMAnalyzer
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"

packages:
  BpmCoreKit:
    path: BpmCoreKit

targets:
  BPMAnalyzer:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BPMAnalyzer
    info:
      path: BPMAnalyzer/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.bpmanalyzer
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: BpmCoreKit
        product: BpmCoreKit
